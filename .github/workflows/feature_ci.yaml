on:
  push:
    branches:
      - '*'
      - '!master'
  pull_request:
    branches:
      - master

name: 'Release Vscode Plugin'
jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
